<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chavdar Chaha - Chaha cha Badshahh</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
    body {
      color: #333;
      overflow-x: hidden;
      background: linear-gradient(-45deg, #fff6e0, #ffe5c2, #fff1d6, #fffaf0);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }
    @keyframes bgMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    header {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('https://i.ibb.co/5X9nwBv1/3843753.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: #fff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    header h1 {
      font-size: 3em;
      color: #ffeb3b;
    }
    header p {
      font-size: 1.4em;
      color: #fff;
      margin-top: 10px;
    }
    .shop-btn {
      margin-top: 25px;
      background: #ff9800;
      color: #fff;
      border: none;
      padding: 15px 35px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }
    .shop-btn:hover {
      background: #e68900;
      transform: scale(1.05);
    }

    section {padding: 60px 20px;}
    h2 {text-align: center; font-size: 2.2em; margin-bottom: 30px; color: #2e2e2e;}

    /* Product carousel */
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-behavior: smooth;
      gap: 20px;
      padding-bottom: 10px;
    }
    .carousel::-webkit-scrollbar {display: none;}
    .product {
      min-width: 260px;
      background: #ffffffcc;
      border-radius: 15px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      flex-shrink: 0;
      text-align: center;
      padding: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .product:hover {transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
    .product img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      border-radius: 10px;
    }
    .product h3 {margin-top: 10px; font-size: 1.2em; color: #222;}
    .product p {color: #555;}
    .add-btn {
      margin-top: 10px;
      background: #43a047;
      color: #fff;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    .add-btn:hover {
      background: #2e7d32;
      transform: scale(1.05);
    }

    /* Cart section */
    #cart {
      background: #f8f9fa;
      padding: 50px 20px;
      border-top: 1px solid #ddd;
    }
    form {
      max-width: 500px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #fff;
    }
    button[type="submit"] {
      background: #25d366;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    button[type="submit"]:hover {background: #1ebe57;}

    /* WhatsApp button */
    .whatsapp-float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 25px;
      right: 25px;
      background-color: #25d366;
      color: #FFF;
      border-radius: 50px;
      text-align: center;
      font-size: 30px;
      box-shadow: 2px 2px 3px #999;
      z-index: 100;
    }
    .whatsapp-float i {
      margin-top: 16px;
    }

    footer {
      background: #1a1a1a;
      color: #fff;
      text-align: center;
      padding: 15px 0;
      margin-top: 30px;
      font-size: 0.9em;
    }

    @media (max-width: 600px) {
      header h1 {font-size: 2.2em;}
      header p {font-size: 1.1em;}
    }
  </style>
</head>
<body>
  <header>
    <h1>Chavdar Chaha</h1>
    <p>Chaha cha Badshahh</p>
    <button class="shop-btn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'});">Shop Now</button>
  </header>

  <section id="products">
    <h2>Our Products</h2>
    <div class="carousel" id="productCarousel">
      <div class="product">
        <img src="https://i.ibb.co/6zQKSYz/Chavdar-Chaha-Amruttulya.jpg" alt="Amruttulya Chaha">
        <h3>Amruttulya Chaha Premix</h3>
        <p>₹45 / 125g | ₹280 / 1kg</p>
        <small>(Wholesale rates available)</small><br>
        <button class="add-btn" onclick="addToCart('Amruttulya Chaha Premix - ₹45 /125g')">Add to Cart</button>
      </div>
    </div>
  </section>

  <section id="cart">
    <h2>Place Your Order</h2>
    <form id="orderForm" onsubmit="sendWhatsApp(event)">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <textarea id="cartItems" rows="4" readonly placeholder="Your selected items..."></textarea>
      <button type="submit">Place Order via WhatsApp</button>
    </form>
  </section>

  <a href="https://wa.me/9623031892" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>

  <footer>
    <p>© 2026 Chavdar Chaha | Crafted with ☕ by Swap</p>
  </footer>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script>
    let cart = [];

    function addToCart(item) {
      cart.push(item);
      document.getElementById('cartItems').value = cart.join('\\n');
      alert(item + " added to cart!");
    }

    function sendWhatsApp(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const items = document.getElementById('cartItems').value;

      if (!items) {
        alert("Your cart is empty!");
        return;
      }

      const msg = encodeURIComponent(
        "New Order from Chavdar Chaha%0A%0A" +
        "Customer Name: " + name + "%0A" +
        "Phone: " + phone + "%0A%0A" +
        "Order Details:%0A" + items + "%0A%0AThank you for choosing Chavdar Chaha!"
      );

      const whatsappURL = `https://wa.me/9623031892?text=${msg}`;
      window.open(whatsappURL, "_blank");
    }

    // Auto scroll carousel
    const carousel = document.getElementById('productCarousel');
    let scrollPos = 0;
    setInterval(() => {
      scrollPos += 1;
      if (scrollPos >= carousel.scrollWidth - carousel.clientWidth) scrollPos = 0;
      carousel.scrollLeft = scrollPos;
    }, 50);
  </script>
</body>
</html>
